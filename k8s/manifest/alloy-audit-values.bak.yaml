controller:
  type: daemonset
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - operator: Exists
  volumes:
    extra:
      - name: auditlog
        hostPath:
          path: /var/log/audit/kube
          type: DirectoryOrCreate

alloy:
  configMap:
    create: true
    content: |
      local.file_match "k8s_audit" {
        path_targets = [{
          __address__ = "localhost",
          __path__    = "/var/log/audit/kube/kube-apiserver*.log",
        }]
      }

      loki.source.file "audit" {
        targets       = local.file_match.k8s_audit.targets
        forward_to    = [loki.process.audit.receiver]
        tail_from_end = true
      }

      loki.process "audit" {
        forward_to = [loki.write.local.receiver]

        stage.static_labels {
          values = {
            job    = "k8s-audit",
            stream = "k8s-audit",
            source = "apiserver-audit",
            node   = constants.hostname,
          }
        }

        stage.json {
          expressions = {
            stage     = "stage",
            verb      = "verb",
            user      = "user.username",
            namespace = "objectRef.namespace",
            resource  = "objectRef.resource",
            code      = "responseStatus.code",
            uri       = "requestURI",
          }
        }

        // Keep only final audit outcome by dropping intermediate stages.
        stage.drop {
          source = "stage"
          value  = "RequestReceived"
        }

        stage.drop {
          source = "stage"
          value  = "ResponseStarted"
        }

        // Drop successful leader-election noise.
        stage.drop {
          source     = "resource,code"
          separator  = ";"
          expression = "^leases;2.*$"
        }

        // Drop successful WATCH noise.
        stage.drop {
          source     = "verb,code"
          separator  = ";"
          expression = "^watch;2.*$"
        }

        // Drop successful get/list/read noise.
        stage.drop {
          source     = "verb,code"
          separator  = ";"
          expression = "^(get|list);2.*$"
        }

        stage.labels {
          values = {
            verb = "verb",
            code = "code",
          }
        }
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.logging.svc.cluster.local:3100/loki/api/v1/push"
          headers = {
            "X-Scope-OrgID" = "1",
          }
        }
      }

  mounts:
    extra:
      - name: auditlog
        mountPath: /var/log/audit/kube
        readOnly: true
